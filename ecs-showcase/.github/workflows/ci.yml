name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r ecs-showcase/app/backend/requirements.txt
      - name: Run tests
        run: pytest ecs-showcase/app/backend/tests -q

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build ecs-showcase/app/backend
      - name: Build frontend image
        run: docker build ecs-showcase/app/frontend

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: fmt
        run: terraform -chdir=ecs-showcase/terraform/environments/dev fmt -check -recursive ../../..
        continue-on-error: true
      - name: init (no backend)
        run: terraform -chdir=ecs-showcase/terraform/environments/dev init -backend=false
      - name: validate
        run: terraform -chdir=ecs-showcase/terraform/environments/dev validate
