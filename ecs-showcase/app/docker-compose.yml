
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: helloworld
      POSTGRES_USER: helloworld
      POSTGRES_PASSWORD: helloworld
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helloworld"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: helloworld
      DB_USER: helloworld
      DB_PASSWORD: helloworld
      APP_ENV: local
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  db-data:
