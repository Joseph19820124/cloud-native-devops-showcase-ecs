server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Frontend is a pure static site. /api/* and /health are routed by the ALB
    # straight to the backend target group, so nginx never proxies them — the
    # browser calls /api on the same ALB host (same origin, no CORS).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
