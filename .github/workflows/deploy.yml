name: Deploy to ECS Fargate

# Runs after the CI workflow succeeds on main (CI already built & pushed the
# image tagged with the commit SHA). This job does NOT rebuild — it just applies
# Terraform pointing at that exact image. Auth is GitHub OIDC -> AWS IAM role.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Deploy only when CI passed (or when invoked manually).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform apply (ship the image CI already built)
        working-directory: ecs-showcase/terraform/environments/dev
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          terraform init -input=false
          terraform apply -input=false -auto-approve -var "image_tag=${IMAGE_TAG}"
