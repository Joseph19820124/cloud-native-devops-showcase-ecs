name: Deploy to ECS Fargate

# Runs automatically after the CI workflow succeeds on main (test gate), and can
# also be triggered manually. Auth is GitHub OIDC -> AWS IAM role (no static keys).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Deploy only when CI passed (or when invoked manually).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Deploy
        working-directory: ecs-showcase
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          IMAGE_TAG: ${{ github.sha }}
        run: ./scripts/deploy.sh
