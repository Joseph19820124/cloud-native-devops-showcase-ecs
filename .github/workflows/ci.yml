name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecs-showcase/app/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest -q

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: fmt
        run: terraform fmt -check -recursive ecs-showcase/terraform
        continue-on-error: true
      - name: init (no backend)
        run: terraform -chdir=ecs-showcase/terraform/environments/dev init -backend=false
      - name: validate
        run: terraform -chdir=ecs-showcase/terraform/environments/dev validate

  # Build both images (validates the Dockerfiles), then push each service to ECR
  # tagged with the SHA of the last commit that touched THAT service's app dir.
  # A service whose code didn't change keeps the same tag, so its image is
  # already in ECR and we skip the push — and Deploy won't roll it.
  # On pull requests we build to validate but do not push.
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build images
        run: |
          docker build --platform linux/amd64 -t backend-ci  ecs-showcase/app/backend
          docker build --platform linux/amd64 -t frontend-ci ecs-showcase/app/frontend

      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Push changed services to ECR (main only)
        if: github.event_name == 'push'
        run: |
          REG="$(aws sts get-caller-identity --query Account --output text).dkr.ecr.${AWS_REGION}.amazonaws.com"
          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$REG"
          for svc in backend frontend; do
            TAG=$(git log -1 --format=%H -- "ecs-showcase/app/$svc")
            if aws ecr describe-images --repository-name "showcase-dev/$svc" --image-ids imageTag="$TAG" >/dev/null 2>&1; then
              echo "== $svc: image $TAG already in ECR — unchanged, skip push =="
            else
              echo "== $svc: pushing new image $TAG =="
              docker tag  "${svc}-ci" "$REG/showcase-dev/$svc:$TAG"
              docker push "$REG/showcase-dev/$svc:$TAG"
            fi
          done
